{% extends "base.html" %}

{% block content %}
<section class="error-section">
    <div class="container">
        <h1 class="error-code">500</h1>
        <h2 class="error-title">Server Error</h2>
        <p class="error-message">Something went wrong on our end. Please try again later.</p>
        <a href="/" class="btn magnetic">Go Back Home</a>
    </div>
</section>

<style>
.error-section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
}

.error-code {
    font-size: 8rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 1rem;
    animation: fadeIn 1s ease;
}

.error-title {
    font-size: 2rem;
    margin-bottom: 1rem;
    animation: fadeIn 1s ease 0.2s both;
}

.error-message {
    font-size: 1.2rem;
    color: #666;
    margin-bottom: 2rem;
    animation: fadeIn 1s ease 0.4s both;
}

.error-section .btn {
    animation: fadeIn 1s ease 0.6s both;
}

.dark-mode .error-message {
    color: #999;
}
</style>
{% endblock %}
