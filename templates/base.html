<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Burhan Ahmed - Portfolio{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body class="{% if session.get('theme') == 'dark' %}dark-mode{% else %}light-mode{% endif %}">
    <!-- Loader -->
    <div class="loader-wrapper">
        <div class="loader"></div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar"></div>

    <!-- Header/Navigation -->
    <header class="header">
        <div class="container">
            <div class="header-content">
                <a href="{{ url_for('main.index') }}" class="logo">burhanlabs.dev</a>
                
                <!-- Desktop Navigation -->
                <nav class="desktop-nav">
                    <ul>
                        <li><a href="{{ url_for('main.index') }}#work">Work</a></li>
                        <li><a href="{{ url_for('main.projects') }}">Projects</a></li>
                        <li><a href="{{ url_for('main.index') }}#about">About</a></li>
                        <li><a href="{{ url_for('main.index') }}#contact">Contact</a></li>
                    </ul>
                </nav>

                <!-- Desktop Actions -->
                <div class="header-actions">
                    <button class="newsletter-trigger btn-small">Subscribe</button>
                </div>

                <!-- Animated Hamburger Menu (Mobile) -->
                <button class="hamburger hamburger--spin" type="button" aria-label="Menu">
                    <span class="hamburger-box">
                        <span class="hamburger-inner"></span>
                    </span>
                </button>
            </div>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div class="mobile-menu">
        <div class="mobile-menu-header">
            <span class="logo">BA</span>
            <button class="close-menu">&times;</button>
        </div>
        <nav>
            <ul>
                <li><a href="{{ url_for('main.index') }}#work">Work</a></li>
                <li><a href="{{ url_for('main.projects') }}">Projects</a></li>
                <li><a href="{{ url_for('main.index') }}#about">About</a></li>
                <li><a href="{{ url_for('main.index') }}#contact">Contact</a></li>
            </ul>
        </nav>
        
        <!-- Theme Toggle Switcher moved inside mobile menu -->
        <div class="theme-switcher-wrapper">
            <span class="theme-label">Theme</span>
            <div class="theme-toggle-switcher" role="switch" aria-checked="{% if session.get('theme') == 'dark' %}true{% else %}false{% endif %}" tabindex="0">
                <span class="switcher-light-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="12" cy="12" r="5" stroke="currentColor" stroke-width="2"/>
                        <line x1="12" y1="1" x2="12" y2="4" stroke="currentColor" stroke-width="2"/>
                        <line x1="12" y1="20" x2="12" y2="23" stroke="currentColor" stroke-width="2"/>
                        <line x1="4" y1="4" x2="6" y2="6" stroke="currentColor" stroke-width="2"/>
                        <line x1="18" y1="18" x2="20" y2="20" stroke="currentColor" stroke-width="2"/>
                        <line x1="1" y1="12" x2="4" y2="12" stroke="currentColor" stroke-width="2"/>
                        <line x1="20" y1="12" x2="23" y2="12" stroke="currentColor" stroke-width="2"/>
                        <line x1="4" y1="20" x2="6" y2="18" stroke="currentColor" stroke-width="2"/>
                        <line x1="18" y1="6" x2="20" y2="4" stroke="currentColor" stroke-width="2"/>
                    </svg>
                </span>
                <span class="switcher-toggle">
                    <span class="switcher-handle"></span>
                </span>
                <span class="switcher-dark-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Image Modal (for full-size viewing) -->
    <div class="image-modal" id="imageModal">
        <span class="close-modal" onclick="closeImageModal()">&times;</span>
        <img class="modal-content" id="modalImage">
        <div class="modal-caption" id="modalCaption"></div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <!-- Particles Animation -->
    <script src="{{ url_for('static', filename='js/particles.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
