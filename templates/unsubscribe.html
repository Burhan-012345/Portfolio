<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribed - Burhan Ahmed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #000000;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 500px;
            margin: 20px;
            padding: 60px 40px;
            background: white;
            border: 1px solid #000000;
            text-align: center;
        }
        
        .profile-image {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 30px;
            display: block;
            object-fit: cover;
            border: 2px solid #000000;
        }
        
        h1 {
            color: #000000;
            margin-bottom: 20px;
            font-size: 32px;
            font-weight: 400;
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }
        
        .icon {
            font-size: 48px;
            margin-bottom: 30px;
            color: #000000;
        }
        
        p {
            margin-bottom: 20px;
            color: #000000;
            font-weight: 300;
            font-size: 16px;
        }
        
        .email {
            font-weight: 500;
            color: #000000;
            background: #f5f5f5;
            padding: 8px 16px;
            display: inline-block;
            margin: 15px 0;
            font-size: 14px;
            letter-spacing: -0.2px;
            border: 1px solid #000000;
        }
        
        .button {
            display: inline-block;
            padding: 14px 40px;
            background: #000000;
            color: #ffffff;
            text-decoration: none;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 14px;
            transition: all 0.3s ease;
            margin-top: 30px;
            border: 1px solid #000000;
            border-radius: 30px;
            cursor: pointer;
        }
        
        .button:hover {
            background: #ffffff;
            color: #000000;
            border: 1px solid #000000;
        }
        
        .note {
            font-size: 13px;
            color: #666666;
            margin-top: 30px;
            font-weight: 300;
        }
        
        .note a {
            color: #000000;
            text-decoration: none;
            border-bottom: 1px solid #000000;
            padding-bottom: 2px;
        }
        
        .note a:hover {
            border-bottom: 2px solid #000000;
        }
        
        hr {
            border: none;
            border-top: 1px solid #000000;
            margin: 30px 0 20px;
            width: 40px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .footer-text {
            font-size: 12px;
            color: #999999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="{{ url_for('static', filename='icons/profile.jpg', _external=True) }}" alt="Burhan Ahmed" class="profile-image">
        <div class="icon">○</div>
        <h1>Unsubscribed</h1>
        <p>You have been successfully removed from our mailing list.</p>
        <div class="email">{{ email }}</div>
        <p>You will no longer receive any communications from us.</p>
        <hr>
        <p class="note">Changed your mind? <a href="{{ url_for('main.index') }}">Subscribe again →</a></p>
        <a href="{{ url_for('main.index') }}" class="button">Return Home</a>
        <div class="footer-text">© BURHAN AHMED</div>
    </div>
</body>
</html>
